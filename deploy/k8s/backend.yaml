apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiforge-backend
  labels: { app: aiforge, component: backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: aiforge, component: backend }
  template:
    metadata:
      labels: { app: aiforge, component: backend }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: backend
          image: aiforge-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: AIFORGE_BACKEND
              value: "mock"
            - name: AIFORGE_DATABASE_URL
              valueFrom:
                secretKeyRef: { name: aiforge-secrets, key: database-url }
            - name: AIFORGE_REDIS_URL
              value: "redis://aiforge-redis:6379/0"
            - name: AIFORGE_JWT_SECRET
              valueFrom:
                secretKeyRef: { name: aiforge-secrets, key: jwt-secret }
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef: { name: aiforge-secrets, key: anthropic-api-key, optional: true }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: aiforge-backend
  labels: { app: aiforge, component: backend }
spec:
  selector: { app: aiforge, component: backend }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aiforge-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aiforge-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
