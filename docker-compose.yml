# aiforge-editor — full stack: backend (FastAPI) + frontend (nginx) +
# postgres + redis.
#
#   docker compose up --build
#
# Frontend: http://localhost:8080 (proxies /api + /health to the backend).
# Backend:  http://localhost:8000 (/health, /ready, /metrics).
# By default the backend runs the OFFLINE mock LLM — no keys needed. To use
# Claude, set AIFORGE_BACKEND=anthropic and ANTHROPIC_API_KEY in a .env file.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiforge}
      POSTGRES_DB: aiforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiforge"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      AIFORGE_BACKEND: ${AIFORGE_BACKEND:-mock}
      AIFORGE_DATABASE_URL: postgresql+psycopg://aiforge:${POSTGRES_PASSWORD:-aiforge}@postgres:5432/aiforge
      AIFORGE_REDIS_URL: redis://redis:6379/0
      AIFORGE_JWT_SECRET: ${AIFORGE_JWT_SECRET:-change-me-in-production-32bytes-minimum}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - aiforge_data:/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
  aiforge_data:
