name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint + pytest, offline)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies (minimal, offline)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-min.txt ruff
      - name: Lint
        run: ruff check aiforge
      - name: Compile check
        run: python -m compileall aiforge
      - name: Tests (offline — MockLLM, no API key)
        env:
          AIFORGE_BACKEND: mock
        run: pytest -q

  frontend:
    name: Frontend (typecheck + build, best-effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
