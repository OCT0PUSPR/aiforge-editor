name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install deps (offline core — no torch, no vendor keys)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-min.txt ruff mypy bandit pip-audit
      - name: Ruff lint
        run: ruff check aiforge
      - name: Ruff format check
        run: ruff format --check aiforge
      - name: Mypy typecheck
        run: mypy aiforge
      - name: Compile check
        run: python -m compileall aiforge
      - name: Tests + coverage gate (offline MockLLM, >=80% core)
        env:
          AIFORGE_BACKEND: mock
        run: pytest --cov=aiforge --cov-report=term-missing --cov-fail-under=80 -q
      - name: Alembic migration check
        env:
          AIFORGE_DATA_DIR: /tmp/aiforge-ci
          AIFORGE_DATABASE_URL: sqlite:////tmp/aiforge-ci/ci.db
        run: |
          mkdir -p /tmp/aiforge-ci
          alembic upgrade head
      - name: Bandit security scan
        run: bandit -q -r aiforge -c pyproject.toml
      - name: pip-audit (informational)
        continue-on-error: true
        run: pip-audit -r requirements-min.txt

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (vitest)
        run: npm run test
      - name: Build
        run: npm run build

  docker:
    name: Docker buildx (backend + frontend)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: aiforge-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: aiforge-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
